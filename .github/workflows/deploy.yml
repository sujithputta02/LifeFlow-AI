name: CI/CD Pipeline - Deploy Containerized LifeFlow to Azure

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-deploy-server:
    name: Build & Deploy FastAPI Backend
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Azure
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Log in to Azure Container Registry (ACR)
      uses: azure/docker-login@v2
      with:
        login-server: ${{ secrets.AZURE_REGISTRY_SERVER }}
        username: ${{ secrets.AZURE_REGISTRY_USERNAME }}
        password: ${{ secrets.AZURE_REGISTRY_PASSWORD }}

    - name: Build & Push Server Container
      uses: docker/build-push-action@v5
      with:
        context: ./server
        push: true
        tags: |
          ${{ secrets.AZURE_REGISTRY_SERVER }}/lifeflow-api:${{ github.sha }}
          ${{ secrets.AZURE_REGISTRY_SERVER }}/lifeflow-api:latest

    - name: Deploy API Container to Azure Web App
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ secrets.AZURE_SERVER_APP_NAME }}
        images: '${{ secrets.AZURE_REGISTRY_SERVER }}/lifeflow-api:${{ github.sha }}'

  build-and-deploy-client:
    name: Build & Deploy Next.js Frontend
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Azure
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Log in to Azure Container Registry (ACR)
      uses: azure/docker-login@v2
      with:
        login-server: ${{ secrets.AZURE_REGISTRY_SERVER }}
        username: ${{ secrets.AZURE_REGISTRY_USERNAME }}
        password: ${{ secrets.AZURE_REGISTRY_PASSWORD }}

    - name: Build & Push Client Container
      uses: docker/build-push-action@v5
      with:
        context: ./client
        push: true
        tags: |
          ${{ secrets.AZURE_REGISTRY_SERVER }}/lifeflow-client:${{ github.sha }}
          ${{ secrets.AZURE_REGISTRY_SERVER }}/lifeflow-client:latest

    - name: Deploy Client Container to Azure Web App
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ secrets.AZURE_CLIENT_APP_NAME }}
        images: '${{ secrets.AZURE_REGISTRY_SERVER }}/lifeflow-client:${{ github.sha }}'
